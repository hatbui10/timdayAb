<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Random Nhóm Gen - Dark Mode</title>
    <style>
        /* Giao diện nền tối */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            height: 100vh;
            margin: 30px;
        }

        h2 { margin-bottom: 20px; color: #00e676; }

        .container {
            display: flex;
            gap: 20px;
        }

        .box {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #00e676;
            border-radius: 12px;
            font-size: 28px;
            font-weight: bold;
            background-color: #1e1e1e;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.2);
            transition: all 0.5s ease;
        }

        /* Hiệu ứng khi ô thay đổi vị trí */
        .box:hover {
            transform: translateY(-10px);
            box-shadow: 0 8px 25px rgba(0, 230, 118, 0.4);
        }

        .timer {
            margin-top: 30px;
            font-size: 14px;
            color: #888;
        }

        #countdown { color: #ff5252; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Hệ Thống Sắp Xếp Ngẫu Nhiên</h2>
    
    <div class="container" id="grid">
        </div>

    <div class="timer">
        Tự động xáo trộn sau: <span id="countdown">15</span> giây
    </div>

    <script>
        const groups = ['Ab', 'AA', 'bb', 'bA'];
        let timeLeft = 15;

        // Hàm xáo trộn mảng
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Hàm hiển thị
        function renderBoxes() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            
            const shuffled = shuffle([...groups]);

            shuffled.forEach(item => {
                const div = document.createElement('div');
                div.className = 'box';
                div.textContent = item;
                container.appendChild(div);
            });
        }

        // Hàm đếm ngược và tự động reset
        function startTimer() {
            setInterval(() => {
                timeLeft--;
                document.getElementById('countdown').textContent = timeLeft;

                if (timeLeft <= 0) {
                    renderBoxes(); // Xáo trộn lại
                    timeLeft = 15; // Reset thời gian
                }
            }, 1000);
        }

        // Chạy lần đầu
        renderBoxes();
        startTimer();
    </script>

</body>
</html>
