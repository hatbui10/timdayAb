<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tìm dãy Ab</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1a1a1a;
            --text: #ffffff;
            --primary: #bb86fc;
            --danger: #cf6679;
            --success: #03dac6;
            --hl-ab: #ffeb3b; 
            --hl-aaa: #4caf50; 
            --hl-bbb: #2196f3; 
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', sans-serif;
            margin: 0; padding: 10px;
            display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; }

        .header-controls {
            position: sticky;
            top: 0;
            background-color: var(--bg);
            padding-bottom: 10px;
            z-index: 100;
            border-bottom: 1px solid #333;
        }

        .count-box {
            background: var(--card);
            border: 2px solid var(--primary);
            border-radius: 10px;
            padding: 10px;
            text-align: center;
            margin: 10px 0;
        }
        #char-count { color: var(--primary); font-size: 1.3rem; font-weight: bold; }

        .config-box {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.9rem;
        }
        .config-row { display: flex; justify-content: space-between; align-items: center; }
        .config-box input {
            width: 60px;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid var(--primary);
            background: #000;
            color: #fff;
            text-align: center;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        button {
            padding: 12px 5px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            color: #000;
            font-size: 0.85rem;
        }

        .btn-abab { background: var(--hl-ab); }
        .btn-aaa { background: var(--hl-aaa); color: white; }
        .btn-bbb { background: var(--hl-bbb); color: white; }
        .btn-undo { background: var(--success); }
        .btn-clear { background: var(--danger); color: white; }
        .btn-upload { background: var(--primary); width: 100%; grid-column: span 2; margin-bottom: 8px; }

        #display-area {
            background: var(--card);
            border-radius: 8px;
            padding: 10px;
            min-height: 300px;
            margin-top: 15px;
            border: 1px solid #333;
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            align-content: flex-start;
        }

        .char-box {
            width: 24px; height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 4px;
            background: #333;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .active-ab { background-color: var(--hl-ab) !important; color: #000; }
        .active-aaa { background-color: var(--hl-aaa) !important; color: #fff; }
        .active-bbb { background-color: var(--hl-bbb) !important; color: #fff; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <div class="count-box">
            Số lượng chữ số: <span id="char-count">0</span>
        </div>

        <div class="config-box">
            <div class="config-row">
                <span>Độ dài tối thiểu dãy (n chữ số):</span>
                <input type="number" id="minChars" value="2" min="2">
            </div>
        </div>

        <input type="file" id="fileInput" accept=".txt">
        <button class="btn-upload" onclick="document.getElementById('fileInput').click()">📁 TẢI FILE (.TXT)</button>

        <div class="controls">
            <button class="btn-abab" onclick="findPattern('Ab')">Tìm Dãy Xen Kẽ</button>
            <button class="btn-aaa" onclick="findPattern('AAA')">Dãy AA... (≥5)</button>
            <button class="btn-bbb" onclick="findPattern('bbb')">Dãy bb... (<5)</button>
            <button class="btn-undo" onclick="undo()">Hoàn Tác</button>
            <button class="btn-clear" onclick="clearAll()" style="grid-column: span 2;">Xoá Bộ Nhớ</button>
        </div>
    </div>

    <div id="display-area"></div>
</div>

<script>
    const displayArea = document.getElementById('display-area');
    const charCount = document.getElementById('char-count');
    const minCharsInput = document.getElementById('minChars');
    let history = [];

    window.onload = () => {
        const data = localStorage.getItem('numData');
        if (data) render(data);
    };

    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (ev) => {
            const text = ev.target.result.replace(/[^0-9]/g, ''); 
            saveState();
            render(text);
        };
        reader.readAsText(file);
    };

    function render(text) {
        localStorage.setItem('numData', text);
        charCount.innerText = text.length;
        displayArea.innerHTML = '';
        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.className = 'char-box';
            span.innerText = char;
            const val = parseInt(char);
            span.dataset.type = (val >= 5) ? 'A' : 'b';
            displayArea.appendChild(span);
        });
    }

    function findPattern(patternType) {
        const spans = document.querySelectorAll('.char-box');
        if (spans.length === 0) return;

        spans.forEach(s => s.classList.remove('active-ab', 'active-aaa', 'active-bbb'));
        const abstractString = Array.from(spans).map(s => s.dataset.type).join('');
        
        let regex;
        let className;
        let minLen = parseInt(minCharsInput.value) || 2;

        if (patternType === 'Ab') {
            // Regex tìm dãy xen kẽ AbAb... hoặc bAbA...
            // Đảm bảo không có AA hoặc bb
            regex = /(A(bA)*b?|b(Ab)*A?)/g;
            className = 'active-ab';
        } else if (patternType === 'AAA') {
            regex = /A+/g;
            className = 'active-aaa';
        } else if (patternType === 'bbb') {
            regex = /b+/g;
            className = 'active-bbb';
        }

        let match;
        while ((match = regex.exec(abstractString)) !== null) {
            // Kiểm tra độ dài chuỗi khớp có thỏa mãn n chữ số không
            if (match[0].length >= minLen) {
                for (let i = match.index; i < regex.lastIndex; i++) {
                    if (spans[i]) spans[i].classList.add(className);
                }
            }
        }
    }

    function saveState() {
        const current = localStorage.getItem('numData');
        if (current) history.push(current);
    }

    function undo() {
        if (history.length > 0) render(history.pop());
    }

    function clearAll() {
        if(confirm("Xoá sạch dữ liệu?")) {
            localStorage.clear();
            displayArea.innerHTML = '';
            charCount.innerText = '0';
        }
    }
</script>

</body>
</html>
