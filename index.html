<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random </title>
    <style>
        /* Thiết lập nền toàn trang */
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
            margin: 20px;
        }

        /* Khung bao bọc chính (Card) */
        .main-card {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            border: 1px solid #333;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h2 { 
            margin-top: 0;
            margin-bottom: 30px; 
            color: #00e676; 
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        /* Container chứa các ô vuông, căn giữa */
        .container {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap; /* Tự xuống dòng nếu màn hình nhỏ */
            margin-bottom: 30px;
        }

        /* Phong cách các ô giá trị */
        .box {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #00e676;
            border-radius: 15px;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(145deg, #1e1e1e, #252525);
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: default;
        }

        .box:hover {
            transform: scale(1.1);
            background-color: #00e676;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
        }

        /* Vùng hiển thị thời gian */
        .timer {
            font-size: 14px;
            color: #aaa;
            padding: 10px 20px;
            background: #252525;
            border-radius: 50px;
            display: inline-block;
        }

        #countdown { 
            color: #ff5252; 
            font-weight: bold; 
            font-family: monospace;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <h2>Sắp Xếp Gen</h2>
        
        <div class="container" id="grid">
            </div>

        <div class="timer">
            Làm mới sau: <span id="countdown">15</span>s
        </div>
    </div>

    <script>
        const groups = ['Ab', 'AA', 'bb', 'bA'];
        let timeLeft = 15;

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function renderBoxes() {
            const container = document.getElementById('grid');
            container.innerHTML = '';
            
            const shuffled = shuffle([...groups]);

            shuffled.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'box';
                div.textContent = item;
                // Thêm hiệu ứng xuất hiện trễ một chút cho đẹp
                div.style.animation = `fadeIn 0.3s ease forwards ${index * 0.1}s`;
                container.appendChild(div);
            });
        }

        function startTimer() {
            setInterval(() => {
                timeLeft--;
                document.getElementById('countdown').textContent = timeLeft;

                if (timeLeft <= 0) {
                    renderBoxes();
                    timeLeft = 15;
                }
            }, 1000);
        }

        renderBoxes();
        startTimer();
    </script>

</body>
</html>
