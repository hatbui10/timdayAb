<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional 8-Bit Generator</title>

  <style>
    :root {
      --primary: #00f7ff;
      --accent: #ff0055;
      --bg: #050510;
      --panel: rgba(20, 20, 40, 0.8);
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: radial-gradient(circle at center, #1a1a3a 0%, var(--bg) 100%);
      font-family: 'Segoe UI', 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
    }

    /* Quy tắc: Cách mép trên 30px */
    .main-wrapper {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    h1 {
      font-size: 1.5rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 20px;
      color: var(--primary);
      text-shadow: 0 0 15px var(--primary);
      font-weight: 800;
    }

    .display-container {
      background: var(--panel);
      backdrop-filter: blur(15px);
      padding: 40px;
      border-radius: 24px;
      border: 1px solid rgba(0, 247, 255, 0.3);
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6);
      text-align: center;
      width: 360px;
      position: relative;
    }

    #output {
      font-family: 'Courier New', Courier, monospace; /* Giữ độ rộng ký tự bằng nhau */
      font-size: 52px;
      font-weight: bold;
      letter-spacing: 6px;
      margin-bottom: 35px;
      padding: 20px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 12px;
      min-height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.1s ease;
    }

    /* Hiệu ứng rung khi đang tính toán */
    .processing {
      animation: glitch 0.15s infinite;
      color: var(--primary) !important;
      filter: blur(1px);
    }

    @keyframes glitch {
      0% { transform: translate(2px, 0); }
      25% { transform: translate(-2px, 0); }
      50% { transform: translate(0, 1px); }
      75% { transform: translate(0, -1px); }
      100% { transform: translate(1px, 0); }
    }

    button {
      background: linear-gradient(135deg, #00f7ff 0%, #0077ff 100%);
      color: #000;
      border: none;
      padding: 16px 40px;
      font-size: 18px;
      font-weight: 900;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 0 20px rgba(0, 247, 255, 0.4);
    }

    button:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 0 30px var(--primary);
    }

    button:active {
      transform: scale(0.95);
    }

    button:disabled {
      background: #333;
      color: #777;
      box-shadow: none;
      cursor: wait;
    }

    .footer-info {
      margin-top: 20px;
      font-size: 12px;
      opacity: 0.5;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <h1>8-BIT GENERATOR</h1>

    <div class="display-container">
      <div id="output">00000000</div>
      <button id="btn-roll" onclick="handleGenerate()">Roll Random</button>
      <div class="footer-info">SEQUENCE MODE: 5-3 RATIO</div>
    </div>
  </div>

  <script>
    const outputEl = document.getElementById("output");
    const btnEl = document.getElementById("btn-roll");

    // Logic chính: Đảm bảo tỷ lệ 5-3 (5 số 0 & 3 số 1 hoặc ngược lại)
    function getFinalSequence() {
      let arr = [];
      const type = Math.random() < 0.5 ? 0 : 1;
      const zeros = type === 0 ? 5 : 3;
      const ones = type === 0 ? 3 : 5;

      for (let i = 0; i < zeros; i++) arr.push("0");
      for (let i = 0; i < ones; i++) arr.push("1");

      // Shuffle Fisher-Yates
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr.join("");
    }

    // Tạo chuỗi giả nhanh để làm hiệu ứng
    function getVisualNoise() {
      return Math.random().toString(2).substring(2, 10).padEnd(8, '0');
    }

    function handleGenerate() {
      btnEl.disabled = true;
      outputEl.classList.add("processing");
      
      let duration = 1200; // Quay trong 1.2 giây
      let intervalTime = 40; 
      let startTime = Date.now();

      const animate = () => {
        const now = Date.now();
        const elapsed = now - startTime;

        outputEl.textContent = getVisualNoise();

        // Hiệu ứng chậm dần (easing out)
        if (elapsed < duration) {
          // Tăng độ trễ mỗi lần lặp để tạo cảm giác bánh xe dừng lại
          let nextTick = intervalTime + (elapsed / duration) * 100;
          setTimeout(animate, nextTick);
        } else {
          finalize();
        }
      };

      animate();
    }

    function finalize() {
      outputEl.classList.remove("processing");
      const result = getFinalSequence();
      outputEl.textContent = result;
      
      // Hiệu ứng "Shockwave" khi dừng
      outputEl.style.color = "var(--primary)";
      outputEl.style.textShadow = "0 0 20px var(--primary), 0 0 40px #fff";
      
      setTimeout(() => {
        outputEl.style.textShadow = "none";
        outputEl.style.color = "#fff";
        btnEl.disabled = false;
      }, 600);
    }
  </script>

</body>
</html>
