<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Professional 8-Bit Generator</title>

  <style>
    :root {
      --primary: #00f7ff;
      --bg: #050510;
      --panel: rgba(255, 255, 255, 0.05);
    }

    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: var(--bg);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      overflow-x: hidden;
    }

    /* YÊU CẦU: 
       - Cách mép trên 30px
       - Cách 2 mép biên 3px (Sử dụng width calc và margin)
    */
    .main-wrapper {
      margin-top: 30px; 
      margin-left: 3px;
      margin-right: 3px;
      width: calc(100% - 6px); 
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card {
      background: var(--panel);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      padding: 40px 20px;
      border-radius: 20px;
      border: 1px solid rgba(0, 247, 255, 0.2);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      text-align: center;
      max-width: 400px;
      width: 100%;
      box-sizing: border-box;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 25px;
      color: var(--primary);
      text-shadow: 0 0 10px var(--primary);
    }

    #output {
      font-family: 'Courier New', Courier, monospace;
      font-size: clamp(30px, 10vw, 45px); /* Tự động co giãn theo màn hình */
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 30px;
      padding: 20px 10px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 12px;
      min-height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      border: 1px inset rgba(255,255,255,0.1);
    }

    /* Hiệu ứng rung mờ khi đang chạy */
    .rolling {
      animation: blurShake 0.1s infinite;
      opacity: 0.8;
      color: var(--primary);
    }

    @keyframes blurShake {
      0% { transform: translate(1px, 0); filter: blur(1px); }
      50% { transform: translate(-1px, 0); filter: blur(2px); }
      100% { transform: translate(0, 0); filter: blur(1px); }
    }

    button {
      background: var(--primary);
      color: #000;
      border: none;
      padding: 15px 35px;
      font-size: 16px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 50px;
      transition: all 0.3s;
      box-shadow: 0 0 15px var(--primary);
    }

    button:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow: 0 0 25px var(--primary);
    }

    button:disabled {
      background: #444;
      color: #888;
      box-shadow: none;
      cursor: not-allowed;
    }

    .mode-tag {
      margin-top: 15px;
      font-size: 10px;
      opacity: 0.4;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <h1>Binary Generator</h1>

    <div class="card">
      <div id="output">0000-0000</div>
      <button id="btn-roll" onclick="startEffect()">Randomize</button>
      <div class="mode-tag">SYSTEM RATIO: 5-3</div>
    </div>
  </div>

  <script>
    const outputEl = document.getElementById("output");
    const btnEl = document.getElementById("btn-roll");

    // Hàm định dạng chuỗi xxxxxxxx thành xxxx-xxxx
    function formatOutput(str) {
      return str.slice(0, 4) + "-" + str.slice(4);
    }

    // Logic 5-3 (giữ nguyên quy tắc của bạn)
    function generateLogic() {
      let arr = [];
      let type = Math.random() < 0.5 ? 0 : 1;
      let zeros = type === 0 ? 5 : 3;
      let ones = type === 0 ? 3 : 5;

      for (let i = 0; i < zeros; i++) arr.push("0");
      for (let i = 0; i < ones; i++) arr.push("1");

      for (let i = arr.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr.join("");
    }

    function startEffect() {
      btnEl.disabled = true;
      outputEl.classList.add("rolling");

      let duration = 1500; // Tổng thời gian chạy 1.5s
      let startTime = Date.now();

      const run = () => {
        const elapsed = Date.now() - startTime;
        
        // Tạo số giả nhảy liên tục
        const fake = Math.random().toString(2).substring(2, 10).padEnd(8, '0');
        outputEl.textContent = formatOutput(fake);

        if (elapsed < duration) {
          requestAnimationFrame(run);
        } else {
          stopEffect();
        }
      };

      requestAnimationFrame(run);
    }

    function stopEffect() {
      outputEl.classList.remove("rolling");
      const result = generateLogic();
      outputEl.textContent = formatOutput(result);
      
      // Hiệu ứng lóe sáng khi kết thúc
      outputEl.style.textShadow = "0 0 25px #fff";
      outputEl.style.transform = "scale(1.1)";
      
      setTimeout(() => {
        outputEl.style.textShadow = "none";
        outputEl.style.transform = "scale(1)";
        btnEl.disabled = false;
      }, 400);
    }
  </script>

</body>
</html>
