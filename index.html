<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Lucky Draw</title>
    <style>
        /* Nền tối sâu thẳm với hiệu ứng hạt mờ */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px;
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid #333;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        h2 {
            color: #00d4ff;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #00d4ff;
        }

        /* 6 ô số kích thước 30x30 */
        .slot-wrapper {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 30px;
        }

        .number-box {
            width: 30px;
            height: 30px;
            background: #000;
            border: 1px solid #00d4ff;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            /* Hiệu ứng đổ bóng Neon */
            box-shadow: 0 0 5px #00d4ff, inset 0 0 5px #00d4ff;
            transition: all 0.2s;
        }

        /* Khi quay sẽ đổi màu sang hồng neon cho lung linh */
        .rolling {
            color: #ff00de;
            border-color: #ff00de;
            box-shadow: 0 0 15px #ff00de, inset 0 0 10px #ff00de;
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: scale(1.1) rotate(2deg); }
            100% { transform: scale(1.1) rotate(-2deg); }
        }

        /* Nút bấm phong cách Cyberpunk */
        button {
            background: transparent;
            color: #00d4ff;
            border: 2px solid #00d4ff;
            border-radius: 10px;
            padding: 10px 25px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        button:hover {
            background: #00d4ff;
            color: #000;
            box-shadow: 0 0 20px #00d4ff;
        }

        button:disabled {
            border-color: #444;
            color: #444;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>LUCKY CODE</h2>
    
    <div class="slot-wrapper">
        <div class="number-box" id="n1">-</div>
        <div class="number-box" id="n2">-</div>
        <div class="number-box" id="n3">-</div>
        <div class="number-box" id="n4">-</div>
        <div class="number-box" id="n5">-</div>
        <div class="number-box" id="n6">-</div>
    </div>

    <button id="drawBtn" onclick="startRandom()">Generate</button>
</div>

<script>
    function startRandom() {
        const boxes = document.querySelectorAll('.number-box');
        const btn = document.getElementById('drawBtn');
        
        btn.disabled = true;

        boxes.forEach((box, index) => {
            box.classList.add('rolling');
            
            // Mỗi ô sẽ có thời gian chạy khác nhau một chút để tạo hiệu ứng đuổi nhau
            let count = 0;
            const maxCounts = 20 + (index * 10); 
            
            const timer = setInterval(() => {
                box.innerText = Math.floor(Math.random() * 10);
                count++;
                
                if (count >= maxCounts) {
                    clearInterval(timer);
                    box.classList.remove('rolling');
                    // Hiệu ứng lóe sáng khi dừng
                    box.style.boxShadow = "0 0 20px #fff";
                    setTimeout(() => {
                        box.style.boxShadow = "0 0 5px #00d4ff, inset 0 0 5px #00d4ff";
                    }, 300);

                    if (index === boxes.length - 1) {
                        btn.disabled = false;
                    }
                }
            }, 50);
        });
    }
</script>

</body>
</html>
