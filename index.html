<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Random 0/1</title>

<style>
body {
    margin: 0;
    background: #020617;
    font-family: sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: white;
}

.card {
    width: 90%;
    max-width: 380px;
    background: #0f172a;
    border-radius: 25px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
}

.title {
    font-size: 1.5rem;
    color: #38bdf8;
    margin-bottom: 20px;
}

/* input */
input {
    width: 120px;
    height: 65px;
    font-size: 2.5rem;
    text-align: center;
    border-radius: 15px;
    border: none;
    outline: none;
    background: #020617;
    color: #38bdf8;
    margin: 0 auto;
    display: block;
}

/* ô copy */
.copy-box {
    margin: 10px auto;
    width: 120px;
    height: 55px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
    letter-spacing: 3px;
    color: #facc15;
    border: 1px solid rgba(255,255,255,0.08);
}

/* grid căn giữa chuẩn */
.grid {
    display: grid;
    grid-template-columns: repeat(6, 38px);
    justify-content: center;
    gap: 10px;
    margin-top: 20px;
}

.circle {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 1.4rem;
    opacity: 0;
    transform: scale(0.5);
}

.show {
    animation: show 0.4s forwards;
}

@keyframes show {
    to { opacity: 1; transform: scale(1); }
}

.num-1 {
    color: #facc15;
    box-shadow: 0 0 10px yellow;
}

.num-0 {
    color: #38bdf8;
    box-shadow: 0 0 10px #38bdf8;
}
</style>
</head>

<body>

<div class="card">
    <div class="title">⚡ Random 0 / 1</div>

    <input id="input" maxlength="2" inputmode="numeric" placeholder="--" autofocus>

    <div class="copy-box" id="copyBox">--</div>

    <div class="grid" id="grid"></div>
</div>

<script>
const rawGroups = {
    "1,1,1,1,0,0": "76,12,45,89,01,23", 
    "1,0,0,0,0,0": "56,34,78,11,22,90",
    "1,1,1,0,0,0": "10,20,30,40,50,60,70",
    "1,1,1,1,1,1": "99,88"
};

const dataMap = {};
for (const [pattern, codes] of Object.entries(rawGroups)) {
    const arr = pattern.split(',').map(Number);
    codes.split(',').forEach(c => dataMap[c.trim()] = arr);
}

const input = document.getElementById("input");
const copyBox = document.getElementById("copyBox");
const grid = document.getElementById("grid");

window.onload = () => input.focus();

function shuffle(a){
    return a.sort(() => Math.random() - 0.5);
}

input.addEventListener("input", function(){
    this.value = this.value.replace(/\D/g,'');

    if(this.value.length === 2){
        let val = this.value;

        // hiển thị ô copy
        copyBox.innerText = val;

        // auto copy (im lặng, không thông báo)
        navigator.clipboard.writeText(val);

        // tạo kết quả
        let pattern = dataMap[val];
        grid.innerHTML = "";

        if(pattern){
            let result = shuffle([...pattern]);

            result.forEach((n,i)=>{
                let div = document.createElement("div");
                div.className = "circle num-" + n;
                div.innerText = n;
                grid.appendChild(div);

                setTimeout(()=>{
                    div.classList.add("show");
                }, i*100);
            });
        }

        // xoá input
        setTimeout(()=>{
            input.value = "";
            input.focus();
        }, 300);
    }
});
</script>

</body>
</html>
